<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMEM Repair Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay"></div>

<!-- App (hidden until authenticated) -->
<div class="app hidden" id="app">

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Repair Tracker</div>
      <div class="logo-sub">SMEM — <span id="userInfo"></span> <button class="logout-btn btn-subtle" id="logoutBtn">Log out</button></div>
    </div>
    <div class="sidebar-dash-toggle">
      <button class="dash-toggle-btn btn-subtle" id="dashToggleBtn">Dashboard →</button>
    </div>
    <div class="sidebar-search">
      <input class="search-input input" type="text" placeholder="Search instruments..." id="searchInput">
    </div>
    <div class="sidebar-filters" id="sidebarFilters"></div>
    <div class="instrument-list" id="instrumentList"></div>
  </div>

  <div class="main">
    <div class="main-empty-state" id="mainEmptyState">
      <div class="dashboard" id="dashboard"></div>
    </div>
    <div class="main-content" id="mainContent">
    <div class="main-header">
      <button class="back-btn hidden" id="backBtn">←</button>
      <div class="main-title-block">
        <div class="instrument-title" id="instrTitle">—</div>
        <div class="instrument-id" id="instrId">Select an instrument</div>
      </div>
      <div class="header-badges">
        <a href="#" class="airtable-link tag tag-md" onclick="return false;">↗ Airtable</a>
        <div id="displayReadyBadge"></div>
        <div class="status-badge tag tag-md tag-unknown" id="statusBadge">unknown</div>
      </div>
    </div>

    <div class="info-strip" id="locationStrip">
      <span class="labels-empty">Location:</span>
      <span class="location-value" id="locationValue">—</span>
    </div>

    <div class="info-strip" id="labelsStrip">
      <span class="labels-empty">No active labels</span>
    </div>

    <div class="info-strip score-strip">
      <div class="score-item">
        <span class="score-lbl">Condition</span>
        <div class="score-bar" id="scoreBar"></div>
        <span class="score-val amber" id="scoreValue">—</span>
      </div>
      <div class="score-item">
        <span class="score-lbl">Last entry</span>
        <span class="score-val" id="lastEntry">—</span>
      </div>
      <div class="score-item">
        <span class="score-lbl">Log entries</span>
        <span class="score-val" id="entryCount">—</span>
      </div>
    </div>

    <div class="log-area" id="logArea">
      <div id="logEntries">
        <div class="empty-state">← Select an instrument to view its log</div>
      </div>

      <div class="add-entry-panel" id="addEntryPanel">
        <div class="add-entry-header">
          <div class="add-entry-title" id="addEntryTitle">New log entry</div>
        </div>
        <div class="add-entry-form">
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-select input" id="entryType"></select>
          </div>
          <div class="form-group" id="statusGroup">
            <label class="form-label">Status
              <span id="statusHint" class="status-hint"></span>
            </label>
            <select class="form-select input" id="entryNewStatus"></select>
          </div>
          <div class="form-group" id="scoreGroup">
            <label class="form-label">Condition score</label>
            <select class="form-select input" id="entryScore">
              <option value="">— no change —</option>
              <option value="1">1 — non-functional</option>
              <option value="2">2</option><option value="3">3</option><option value="4">4</option>
              <option value="5">5 — partial</option>
              <option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option>
              <option value="10">10 — excellent</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input class="form-input input" type="date" id="entryDate">
          </div>
          <div class="form-group full" id="locationGroup">
            <label class="form-label">Location</label>
            <input class="form-input input" type="text" id="entryLocation" placeholder="Leave blank if unchanged">
          </div>
          <!-- Labels row -->
          <div class="form-group full" id="labelsFormGroup">
            <label class="form-label">Labels</label>
            <div id="labelsFormRow" class="labels-form-row"></div>
          </div>
          <!-- Display ready preview -->
          <div class="form-group full" id="displayReadyGroup">
            <label class="form-label">Display ready after this entry</label>
            <div id="displayReadyPreview" class="dr-preview-row"></div>
          </div>
          <div class="form-group full">
            <label class="form-label">Attachments</label>
            <div>
              <input type="file" class="attach-input" id="entryFiles" multiple accept="image/*,.pdf,.doc,.docx">
              <button type="button" class="attach-btn btn-subtle">+ Add files</button>
              <div class="attach-preview" id="attachPreview"></div>
            </div>
          </div>
          <div class="form-group full">
            <label class="form-label">Notes</label>
            <textarea class="form-textarea input" id="entryNotes" placeholder="Describe the work done, findings, or next steps…"></textarea>
          </div>
          <div class="form-group full form-actions">
            <button class="submit-btn" id="submitBtn" disabled>Log entry</button>
          </div>
        </div>
      </div><!-- /add-entry-panel -->


    </div><!-- /log-area -->

    <div class="add-log-bar hidden" id="addLogBar">
      <button class="add-log-btn btn-subtle" id="addLogBtn">+ New entry</button>
    </div>

    </div><!-- /main-content -->
  </div><!-- /main -->
</div><!-- /app -->

<script type="module" src="app.js"></script>
</body>
</html>
